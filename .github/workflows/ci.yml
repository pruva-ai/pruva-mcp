name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lib:
    name: Library (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run test:coverage

      - if: matrix.node == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  deploy:
    name: Deploy wrapper build
    runs-on: ubuntu-latest
    needs: lib
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build library
        run: |
          npm ci
          npm run build

      - name: Build deploy wrapper
        working-directory: deploy
        run: |
          npm ci
          npm run build
